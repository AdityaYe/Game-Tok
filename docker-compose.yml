services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api/v1
        VITE_SOCKET_URL: http://localhost:3000

    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    build: ./backend

    ports:
      - "3000:3000"

    env_file:
      - ./backend/.env
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/gametok
      CLIENT_URL: http://localhost:5173
      NODE_ENV: production
      COOKIE_SECURE: "false"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
